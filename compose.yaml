services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wobble-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wobble_os
      POSTGRES_USER: wobble
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - wobble_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wobble -d wobble_os"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  wobble_postgres_data:
