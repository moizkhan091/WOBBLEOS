name: CI

# Runs the full WOBBLE OS check suite automatically on every push and pull
# request, on a clean Linux runner. This is the safety net so no one has to
# run tests by hand, and so broken code is caught BEFORE it reaches the VPS.
#
# `npm ci` installs the correct Linux binaries from package-lock.json, which
# is why CI works even though a Windows-installed node_modules cannot run the
# test runner. Every AI builder (Codex, Claude, Gemini, Antigravity) gets the
# same automatic check.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}   # allow a manual re-run of the full CI (the e2e gate is already required on push/PR)

# Queue runs for the same branch instead of cancelling older runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Strict clean install from the committed lockfile (WOB-AUD-008). The lock is generated with the
      # same npm that ships in Node 22 and records every platform's optional binaries, so `npm ci` is
      # reproducible on Linux CI, Windows dev, and the alpine Docker build alike.
      - name: Install dependencies (strict)
        run: npm ci --no-audit --no-fund

      - name: DB-proof coverage guard (static)
        run: npm run verify:coverage

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: e2e browser gate (Playwright)
    runs-on: ubuntu-latest
    # REQUIRED browser gate on push + PR. Proves REAL DB effects (escalation resume/terminate/dismiss,
    # handoff retry/cancel, budget/KPI verified usage) against the production build + a real Postgres.
    # Two CI-env fixes made it green from a clean checkout: migration 0026 is now idempotent (from-scratch
    # apply), and the E2E server issues a non-secure session cookie (SESSION_COOKIE_INSECURE via the
    # Playwright config) so authed API reads over http are not 401'd.
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16   # pgvector: migrations create vector columns
        env:
          POSTGRES_USER: wobble
          POSTGRES_PASSWORD: wobble
          POSTGRES_DB: wobble_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wobble -d wobble_e2e"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://wobble:wobble@127.0.0.1:5432/wobble_e2e
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      # Run the prebuilt app (avoids a rebuild inside the webServer start-timeout).
      PLAYWRIGHT_WEB_COMMAND: "npm run start -- --port 3100"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run build
      - run: npx playwright test
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/.artifacts/html-report
            e2e/.artifacts/test-results
          retention-days: 14

  db-proofs:
    name: integrated DB-proof gate (all proofs vs pgvector)
    runs-on: ubuntu-latest
    # Runs the FILESYSTEM-DRIVEN proof runner (WOB-AUD-015) against a fresh pgvector DB — the previously
    # unexercised release-gate lane. Every src/scripts/verify-*-db.ts runs (minus the manifest deferrals).
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_USER: wobble, POSTGRES_PASSWORD: wobble, POSTGRES_DB: wobble_ci }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wobble -d wobble_ci"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://wobble:wobble@127.0.0.1:5432/wobble_ci
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci --no-audit --no-fund
      - name: Migrate + seed (fresh pgvector)
        run: npm run db:migrate && npm run db:seed
      - name: All DB proofs (integrated gate)
        run: npm run verify:all-db

  docker-safety:
    name: docker image content safety + worker runtime
    runs-on: ubuntu-latest
    # Proves the image no longer leaks local storage/docs/tests (WOB-AUD-002) and the worker image can run
    # the tsx entrypoints (WOB-AUD-003) — neither was checked by the old CI.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Build runner image
        run: docker build --target runner -t wobble-os:ci .
      - name: Image content guard (no storage/docs/tests/.env; required runtime paths present)
        run: node scripts/check-docker-image.mjs wobble-os:ci
      - name: Build worker image + assert tsx entrypoints run
        run: |
          docker build --target worker -t wobble-worker:ci .
          docker run --rm --entrypoint sh wobble-worker:ci -c "node_modules/.bin/tsx --version"
          # both worker commands must reach app logic (NOT 'tsx: not found')
          docker run --rm wobble-worker:ci npm run worker 2>&1 | grep -q "DATABASE_URL is not set"
